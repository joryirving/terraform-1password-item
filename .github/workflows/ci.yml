name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          version: 1.8

      - name: Run tofu init
        id: init
        run: tofu init -upgrade

      - name: Run tofu validate
        run: tofu validate

  validate-example:
    name: Validate example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          version: 1.8

      - name: Run tofu init on example
        id: init
        run: |
          cd examples/simple
          tofu init -upgrade

      - name: Run tofu validate on example
        run: |
          cd examples/simple
          tofu validate

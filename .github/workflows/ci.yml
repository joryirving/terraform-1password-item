name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          version: 1.8

      - name: Run tofu init
        id: init
        run: tofu init -upgrade

      - name: Run tofu validate
        run: tofu validate

  validate-example:
    name: Validate example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          version: 1.8

      - name: Run tofu init on example
        id: init
        run: |
          cd examples/simple
          tofu init -upgrade

      - name: Run tofu validate on example
        run: |
          cd examples/simple
          tofu validate
